server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # registry.json must never be cached — instances are added/removed over time.
    location = /registry.json {
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # config.js is written at container startup — never cache it.
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # All other static assets get long-term immutable caching (Vite hashes their filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
